version: '3.9'

services:
  bombstats-db:
    container_name: bombstats-db
    platform: linux/x86_64
    image: mysql:8.0
    restart: unless-stopped
    volumes:
      - bombstats-db:/var/lib/mysql
    ports:
      - 3306:3306
    env_file:
      - .env
    networks:
      - bombstats-network
volumes:
  bombstats-db:

networks:
  bombstats-network:
    external: true
